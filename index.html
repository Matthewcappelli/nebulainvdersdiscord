<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2b1624">
    <meta property="og:title" content="Sakura Invaders">
    <meta property="og:description" content="A cherry blossom arcade game made for Discord hangouts.">
    <title>Sakura Invaders</title>
    <link rel="stylesheet" href="styles.css?v=sakura-20260528">
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Sakura Invaders game">
        <canvas id="game" width="960" height="720"></canvas>
        <div class="touch-controls" aria-label="Touch controls">
          <button class="touch-key" data-key="arrowleft" type="button" aria-label="Move left">&larr;</button>
          <button class="touch-key fire" data-key=" " type="button" aria-label="Fire">&bull;</button>
          <button class="touch-key" data-key="arrowright" type="button" aria-label="Move right">&rarr;</button>
        </div>
        <div class="overlay" id="overlay">
          <div class="mark">Sakura Invaders</div>
          <h1>Guard the grove.</h1>
          <p>Drift through blossom waves, send petal shots, and protect the moonlit garden.</p>
          <button id="startButton" type="button">Start Game</button>
        </div>
      </section>

      <aside class="panel" aria-label="Game status">
        <div class="brand">
          <span class="dot"></span>
          <span>Sakura Invaders</span>
        </div>

        <dl class="stats">
          <div>
            <dt>Score</dt>
            <dd id="score">0</dd>
          </div>
          <div>
            <dt>Wave</dt>
            <dd id="wave">1</dd>
          </div>
          <div>
            <dt>Lives</dt>
            <dd id="lives">3</dd>
          </div>
          <div>
            <dt>Best</dt>
            <dd id="best">0</dd>
          </div>
        </dl>

        <div class="controls">
          <h2>Controls</h2>
          <p><kbd>A</kbd><kbd>D</kbd> or <kbd>&larr;</kbd><kbd>&rarr;</kbd> move</p>
          <p><kbd>Space</kbd> releases petals</p>
          <p><kbd>P</kbd> pauses</p>
        </div>

        <div class="discord">
          <h2>Discord</h2>
          <p id="playerStatus">Playing as Guest</p>
        </div>

        <div class="leaderboard">
          <h2>Leaderboard</h2>
          <ol id="leaderboardList">
            <li>Loading scores...</li>
          </ol>
        </div>
      </aside>
    </main>

    <script type="module" src="dist/game.js?v=leaderboard-sdk-20260528"></script>
  </body>
</html>
